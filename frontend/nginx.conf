server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all non-file routes serve index.html so React Router works on hard refresh
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite content-hashes them)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache the HTML entry point + enforce all security headers here
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;

        # Content Security Policy — moved from <meta> tag for full enforcement
        # (frame-ancestors is ignored by browsers inside <meta>, only works as HTTP header)
        add_header Content-Security-Policy "
            default-src 'none';
            script-src 'self' https://accounts.google.com https://apis.google.com https://www.google.com;
            connect-src 'self' ${BACKEND_URL} https://api.rawg.io https://api.isthereanydeal.com https://accounts.google.com https://www.googleapis.com;
            img-src 'self' data: blob: https://res.cloudinary.com https://*.akamaihd.net https://*.rawg.io https://image.api.playstation.com https://i.ytimg.com https://lh3.googleusercontent.com https://www.gstatic.com;
            media-src 'self' https://*.akamaihd.net https://i.ytimg.com;
            frame-src https://open.spotify.com https://www.youtube.com https://accounts.google.com;
            style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
            font-src 'self' https://fonts.gstatic.com;
            base-uri 'self';
            form-action 'self';
            frame-ancestors 'none';
        " always;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
