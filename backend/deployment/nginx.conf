# =========================
# GZIP COMPRESSION (Refinement)
# =========================
# 'gzip on' is already set globally in /etc/nginx/nginx.conf
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    text/xml
    application/xml
    application/xml+rss
    text/javascript;

# =========================
# RATE LIMITING ZONE
# =========================
# Shared memory for IP tracking (10MB zone ~160k IPs)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

# =========================
# HIDE NGINX VERSION
# =========================
server_tokens off;

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.my-gamehub.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.my-gamehub.com;

    # =========================
    # SSL CERTIFICATES
    # =========================
    ssl_certificate /etc/letsencrypt/live/api.my-gamehub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.my-gamehub.com/privkey.pem;

    # =========================
    # SSL SECURITY
    # =========================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # =========================
    # SECURITY HEADERS
    # =========================
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # =========================
    # API LOCATION
    # =========================
    location /api/ {
        # Rate limiting (uses global zone)
        limit_req zone=api_limit burst=10;
        limit_req_status 429;

        # Reverse proxy to Node.js
        # No trailing slash here so /api/ remains in the path
        proxy_pass http://localhost:8080;

        # Headers for Express
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts (Longer for Steam/Xbox Syncs)
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Fallback for any other root requests
    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check
    location /health {
        access_log off;
        return 200 'OK';
    }
}